repos:
  # 1. Non-Python formatting (Prettier) — before any linters read those files
  # Prettier
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        types_or: [markdown]

  # 2. Python formatting before linting — linter sees already-formatted code
  # Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix]

  # 4. Type checking last — needs clean, linted code to be meaningful
  # ty : https://github.com/astral-sh/ty/issues/269
  - repo: local
    hooks:
      - id: ty-check
        name: ty check
        description: Type check with ty.
        entry: uvx ty check
        language: system
        pass_filenames: false
        require_serial: true
